name: Playwright Tests

concurrency:
  group: playwright-tests
  cancel-in-progress: true

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Install Xvfb for headed Chromium
        run: sudo apt-get install -y xvfb

      - name: Run Playwright tests
        id: run_tests
        run: xvfb-run --auto-servernum -- npx playwright test --project=chromium
        env:
          CI: ""
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        continue-on-error: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (JUnit XML + traces)
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Parse test results
        if: always()
        id: parse_results
        run: |
          XML=test-results/results.xml
          if [ -f "$XML" ]; then
            get() { grep -oP "$1=\"\K[0-9]+" "$XML" | head -1; }
            TOTAL=$(get tests)
            FAILED=$(get failures)
            ERRORS=$(get errors)
            SKIPPED=$(get skipped)
            PASSED=$(( TOTAL - FAILED - ERRORS - SKIPPED ))
          else
            TOTAL=0
            PASSED=0
            FAILED=0
            SKIPPED=0
          fi
          echo "total=$TOTAL"   >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

      - name: Send test report email
        if: always()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.resend.com
          server_port: 465
          secure: true
          username: resend
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Playwright [${{ steps.run_tests.outcome == 'success' && 'PASSED' || 'FAILED' }}] ${{ github.repository }} @ ${{ github.ref_name }} — ${{ steps.parse_results.outputs.passed }}/${{ steps.parse_results.outputs.total }} passed"
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: Playwright CI <onboarding@resend.dev>
          body: |
            Playwright Test Execution Summary
            ==================================

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Triggered  : ${{ github.event_name }}

            Run URL
            -------
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Results
            -------
            Total   : ${{ steps.parse_results.outputs.total }}
            Passed  : ${{ steps.parse_results.outputs.passed }}
            Failed  : ${{ steps.parse_results.outputs.failed }}
            Skipped : ${{ steps.parse_results.outputs.skipped }}

            Artifacts
            ---------
            HTML Report :
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts

            Artifacts are retained for 14 days.

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
