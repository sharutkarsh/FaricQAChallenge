name: Playwright Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Install Xvfb for headed Chromium
        run: sudo apt-get install -y xvfb

      - name: Run Playwright tests
        id: run_tests
        # xvfb-run gives Chromium a real display — avoids headless bot fingerprint
        # CI="" keeps headless:false in playwright.config.ts
        run: xvfb-run --auto-servernum -- npx playwright test --project=chromium
        env:
          CI: ""
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        continue-on-error: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (JUnit XML + traces)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Parse test results
        if: always()
        id: parse_results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/results.xml
          publish_results: false

      - name: Send test report email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.resend.com
          server_port: 465
          secure: true
          username: resend
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Playwright [${{ steps.run_tests.outcome == 'success' && 'PASSED' || 'FAILED' }}] ${{ github.repository }} @ ${{ github.ref_name }} — ${{ steps.parse_results.outputs.passed }}/${{ steps.parse_results.outputs.total }} passed"
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: Playwright CI <onboarding@resend.dev>
          body: |
            Playwright Test Execution Summary
            ==================================
            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Triggered  : ${{ github.event_name }}
            Run URL    : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Results
            -------
            Total      : ${{ steps.parse_results.outputs.total }}
            Passed     : ${{ steps.parse_results.outputs.passed }}
            Failed     : ${{ steps.parse_results.outputs.failed }}
            Skipped    : ${{ steps.parse_results.outputs.skipped }}

            Artifacts & Logs
            ----------------
            HTML Report  : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts
            Screenshots  : Download the "test-results" artifact — screenshots are under
                           test-results/<test-name>/test-failed-1.png
            Traces       : Download the "test-results" artifact — open .zip files in
                           https://trace.playwright.dev for step-by-step replay
            Artifacts are retained for 14 days.

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
